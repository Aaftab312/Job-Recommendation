<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>

<body>
    <div class="auth-card">

        <h1>AI Powered Job Recommendation System</h1>
        <h1>Login</h1>
        <p class="subtitle">Access your personalized recommendation dashboard</p>

        <form action="/login" method="post" class="job-form">
            <label>Email</label>
            <input type="email" name="email" required />

            <label>Password</label>
            <input type="password" name="password" required />

            <button type="submit">Login</button>
        </form>

        <div class="links">
            # <p>Don't have an account? <a href="/signup">Create one</a></p>
            <p><a href="/forgot-password">Forgot your password?</a></p>
        </div>
    </div>

    <div id="toast-container"></div>

    <div id="flash-data" style="display: none;">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="flash-item" data-category="{{ category }}" data-message="{{ message | e }}">
        </div>
        {% endfor %}
        {% endwith %}
    </div>

    <script>
        window.onload = function () {
            const container = document.getElementById("toast-container");
            const flashItems = document.querySelectorAll(".flash-item");

            flashItems.forEach(function (item) {
                const category = item.dataset.category;
                const message = item.dataset.message;

                const toast = document.createElement("div");
                toast.className = "toast " + (category === "error" ? "toast-error" : "toast-success");
                toast.innerText = message;

                container.appendChild(toast);

                setTimeout(function () {
                    toast.classList.add("hide");
                    setTimeout(function () {
                        toast.remove();
                    }, 500);
                }, 3000);
            });
        };
    </script>
</body>

</html>
