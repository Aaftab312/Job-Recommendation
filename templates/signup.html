<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>

<body>
    <div class="auth-card">

        <h2>AI Powered Job Recommendation System</h2>
        <h2>Sign Up</h2>
        <p class="subtitle">Create your account to get personalized job recommendations</p>

        <form action="/signup" method="post" class="job-form">
            <label>Username</label>
            <input type="text" name="username" required />

            <label>Email</label>
            <input type="email" name="email" required />

            <label>Password</label>
            <input type="password" name="password" required />

            <label>Confirm Password</label>
            <input type="password" name="confirm_password" required />

            <button type="submit">Sign Up</button>
        </form>

        <div class="links">
            <p>Already have an account? <a href="/login">Login</a></p>
        </div>
    </div>

    <div id="toast-container"></div>

    <div id="flash-data" style="display: none;">
        {% with messages = get_flashed_messages(with_categories=True) %}
        {% for category, message in messages %}
        <div class="flash-item" data-category="{{ category }}" data-message="{{ message | e }}">
        </div>
        {% endfor %}
        {% endwith %}
    </div>

    <script>
        window.onload = function () {
            const container = document.getElementById("toast-container");
            const flashItems = document.querySelectorAll(".flash-item");

            flashItems.forEach(function (item) {
                const category = item.dataset.category;
                const message = item.dataset.message;

                const toast = document.createElement("div");
                toast.className = "toast " + (category === "error" ? "toast-error" : "toast-success");
                toast.innerText = message;

                container.appendChild(toast);

                setTimeout(function () {
                    toast.classList.add("hide");
                    setTimeout(function () {
                        toast.remove();
                    }, 500);
                }, 3000);
            });
        };
    </script>
</body>

</html>
